<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Predictor v1.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #050507;
      --bg1:        #0a0a0f;
      --bg2:        #0e0e14;
      --bg3:        #14141c;
      --border:     #1a1a25;
      --border2:    #252535;
      --green:      #00ff88;
      --green-dim:  #00cc6a;
      --red:        #ff4466;
      --red-dim:    #cc3355;
      --yellow:     #ffd700;
      --cyan:       #00d4ff;
      --cyan-dim:   #0099cc;
      --purple:     #9d4edd;
      --text:       #c9d1d9;
      --text-dim:   #6e7681;
      --text-bright:#e6edf3;
      --mono:       'JetBrains Mono', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg1); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .online-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--green);
    }

    .logo span { color: var(--text-dim); font-weight: 400; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .clock {
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .clock span { color: var(--cyan); }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    main {
      padding: 20px 24px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* ── Dashboard two-column grid ────────────────────────────────────────── */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }
    .dash-sidebar {
      position: sticky;
      top: 72px;
    }
    @media (max-width: 1100px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .dash-sidebar { position: static; }
    }

    /* ── Section header ────────────────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .section-title::before {
      content: '// ';
      color: var(--green);
    }

    /* ── Cards ─────────────────────────────────────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent, var(--cyan));
      opacity: 0.6;
    }

    .card:hover { border-color: var(--border2); }

    .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 11px;
      color: var(--text-dim);
    }

    .green  { color: var(--green); }
    .red    { color: var(--red); }
    .yellow { color: var(--yellow); }
    .cyan   { color: var(--cyan); }
    .purple { color: var(--purple); }
    .dim    { color: var(--text-dim); }

    /* ── Panel ─────────────────────────────────────────────────────────────── */
    .panel {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .panel-meta {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Table ─────────────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead tr {
      background: var(--bg2);
    }

    thead th {
      padding: 8px 14px;
      text-align: right;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    thead th:first-child { text-align: left; }

    tbody tr {
      border-bottom: 1px solid rgba(26,26,37,0.5);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    tbody td {
      padding: 9px 14px;
      text-align: right;
      white-space: nowrap;
      color: var(--text);
    }

    tbody td:first-child {
      text-align: left;
      color: var(--text-bright);
      font-weight: 500;
    }

    /* ── Probability bar ───────────────────────────────────────────────────── */
    .prob-cell {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .prob-bar-wrap {
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      height: 8px;
      width: 100%;
    }

    .prob-bar {
      height: 8px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--cyan-dim), var(--cyan));
      transition: width 0.4s ease;
    }

    .prob-bar.top { background: var(--green); }
    tr.bracket-top { background: rgba(0,255,136,0.05); }

    /* ── Edge pill ─────────────────────────────────────────────────────────── */
    .edge-pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
    }

    .edge-high   { background: rgba(0,255,136,0.12); color: var(--green); }
    .edge-med    { background: rgba(0,255,136,0.07); color: var(--green-dim); }
    .edge-low    { background: rgba(255,215,0,0.08); color: var(--yellow); }
    .edge-neg    { background: rgba(255,68,102,0.08); color: var(--red); }

    /* ── Signal row ────────────────────────────────────────────────────────── */
    .side-yes { color: var(--green); font-weight: 700; }
    .side-no  { color: var(--red);   font-weight: 700; }

    .sig-row-winning { background: rgba(0, 255, 136, 0.07); border-left: 2px solid var(--green); }
    .sig-row-losing  { background: rgba(255, 59,  59,  0.07); border-left: 2px solid var(--red); }
    .sig-row-neutral { border-left: 2px solid #444; }
    .sig-row-winning:hover { background: rgba(0, 255, 136, 0.14); }
    .sig-row-losing:hover  { background: rgba(255, 59,  59,  0.14); }

    /* ── Chart container ───────────────────────────────────────────────────── */
    .chart-wrap {
      padding: 16px;
      height: 260px;
      position: relative;
    }

    /* ── Refresh button ────────────────────────────────────────────────────── */
    .btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .btn.loading { opacity: 0.5; pointer-events: none; }

    /* ── Status dot ────────────────────────────────────────────────────────── */
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .dot-yellow { background: var(--yellow); }
    .dot-red  { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── No signals ────────────────────────────────────────────────────────── */
    .no-signals {
      padding: 28px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
    }

    .no-signals span { color: var(--yellow); }

    /* ── Spinner ───────────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--border2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Loading overlay ───────────────────────────────────────────────────── */
    .loading-overlay {
      padding: 40px;
      text-align: center;
      color: var(--text-dim);
    }

    /* ── Two column layout ─────────────────────────────────────────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ── Trade log ─────────────────────────────────────────────────────────── */
    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
    }

    /* ── Positive / negative row highlight ─────────────────────────────────── */
    tbody tr.row-win  { border-left: 2px solid var(--green); }
    tbody tr.row-loss { border-left: 2px solid var(--red); }

    /* ── Tooltip ───────────────────────────────────────────────────────────── */
    .tooltip {
      font-size: 10px;
      color: var(--text-dim);
      font-style: italic;
      padding: 8px 16px;
      border-top: 1px solid var(--border);
    }

    /* ── Compact summary stats (sidebar 2x2 grid) ─────────────────────────── */
    .bb-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .bb-stat {
      padding: 10px 12px;
      background: var(--bg1);
      min-width: 0;
    }
    .bb-stat-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2px;
    }
    .bb-stat-val {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .bb-stat-sub {
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 1px;
    }
    .bb-chart-wrap {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .bb-chart-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .bb-status {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .bb-status-won      { background: rgba(0,255,136,0.12); color: var(--green); }
    .bb-status-lost     { background: rgba(255,68,102,0.12); color: var(--red); }
    .bb-status-pending  { background: rgba(255,215,0,0.10); color: var(--yellow); }
    .bb-status-canceled { background: rgba(255,255,255,0.05); color: var(--text-dim); }
    .bb-pnl-pos { color: var(--green); font-weight: 700; }
    .bb-pnl-neg { color: var(--red);   font-weight: 700; }
    .bb-pnl-nil { color: var(--text-dim); }

    /* ── Game card compact ─────────────────────────────────────────────────── */
    .signal-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 5px;
      min-width: 220px;
      max-width: 260px;
      padding: 6px 8px;
      transition: opacity 0.2s, border-color 0.2s;
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <div class="online-dot"></div>
    <div class="logo" id="logo-text">SPORTS PREDICTOR <span>v1.0</span></div>
  </div>
  <div class="header-right">
    <div class="clock">ET &nbsp;<span id="clock">--:--:--</span></div>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main>

  <!-- ── BASEBALL PAGE (main content) ───────────────────────────────────── -->
  <div id="page-baseball" class="page active">
    <div class="section-header">
      <div class="section-title">baseball · mlb</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="dim" style="font-size:11px">vegas consensus vs kalshi · pre-game EV</span>
        <span style="font-size:10px;color:var(--text-dim)">bot scans: <span style="color:var(--cyan)">10AM–12AM ET</span> · every 30min</span>
        <span id="bb-odds-quota" style="font-size:10px;color:var(--text-dim)"></span>
        <span id="bb-refresh-label" class="dim" style="font-size:11px"></span>
        <button class="btn" onclick="loadBaseball(true)">↺ refresh</button>
      </div>
    </div>

    <div id="baseball-content">
      <div class="dim" style="padding:40px;text-align:center">Loading MLB games...</div>
    </div>
  </div>

</main>

<script>
// ── Clock + Market Open Countdown ──────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const et  = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  document.getElementById('clock').textContent = et.toTimeString().slice(0, 8);

  // Time to next 6 AM ET
  const cd = document.getElementById('market-open-countdown');
  if (cd) {
    const next6am = new Date(et);
    next6am.setHours(6, 0, 0, 0);
    if (et >= next6am) next6am.setDate(next6am.getDate() + 1); // already past, use tomorrow
    const diffMs  = next6am - et;
    const diffSec = Math.floor(diffMs / 1000);
    const h = String(Math.floor(diffSec / 3600)).padStart(2, '0');
    const m = String(Math.floor((diffSec % 3600) / 60)).padStart(2, '0');
    const s = String(diffSec % 60).padStart(2, '0');
    cd.textContent = `${h}:${m}:${s}`;
  }
}
setInterval(updateClock, 1000);
updateClock();

// ── City switcher / Nav removed — single-page baseball layout ─────────────

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt = {
  pct:    v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%',
  dollar: v => (v >= 0 ? '+' : '') + '$' + Math.abs(v).toFixed(2),
  edge:   v => (v >= 0 ? '+' : '') + v.toFixed(1) + 'c',
};

function edgeClass(v) {
  if (v >= 15) return 'edge-high';
  if (v >= 7)  return 'edge-med';
  if (v >= 0)  return 'edge-low';
  return 'edge-neg';
}

function colorClass(v) {
  if (v > 0) return 'green';
  if (v < 0) return 'red';
  return 'dim';
}

// ── Weather bankroll/kelly removed — not used in baseball-only mode ────────

// ── Weather bet countdown removed ──────────────────────────────────────────

// ── Trade log ──────────────────────────────────────────────────────────────
let _bbPnlChart        = null;
let _bbRefreshTimer    = null;
let _bbCountdown       = 0;
const BB_REFRESH_SEC   = 60;

// ── Fast live-score refresh (20s) when games are in progress ─────────────────
let _liveScoreTimer = null;

async function _refreshLiveScores() {
  const liveCards = document.querySelectorAll('[data-live-game]');
  if (!liveCards.length) { clearInterval(_liveScoreTimer); _liveScoreTimer = null; return; }
  const scores = await fetchMLBScores();
  liveCards.forEach(card => {
    const away = card.dataset.away;
    const home = card.dataset.home;
    const sc   = _scoreKey(scores, away, home);
    if (!sc) return;
    const scoreEl = card.querySelector('.live-score');
    const situEl  = card.querySelector('.live-situ');
    const winnerEl = card.querySelector('.live-winner');
    if (scoreEl && sc.awayScore !== null) {
      scoreEl.textContent = `${sc.awayScore} – ${sc.homeScore}`;
      scoreEl.style.color = 'var(--cyan)';
    }
    if (situEl) {
      situEl.textContent = sc.done ? 'Final'
        : sc.inning ? `${sc.half === 'Bottom' ? '▼' : '▲'}${sc.inning}`
        : 'In Progress';
    }
    if (winnerEl && sc.done && sc.awayScore !== null) {
      const winner = sc.awayScore > sc.homeScore ? away : home;
      winnerEl.textContent = `▶ ${winner}`;
      winnerEl.style.display = '';
    }
  });
}

function _startLiveScoreTimer() {
  if (_liveScoreTimer) clearInterval(_liveScoreTimer);
  _liveScoreTimer = setInterval(_refreshLiveScores, 20000);
}

// ── Next-game countdown (ticks every second) ────────────────────────────────
let _nextGameTimer     = null;
let _nextGameEpoch     = null;   // ms epoch of next game's first pitch

function _bbStartNextGameCountdown(minsToGame) {
  if (_nextGameTimer) { clearInterval(_nextGameTimer); _nextGameTimer = null; }
  // Compute target epoch from current time + remaining minutes
  _nextGameEpoch = Date.now() + (minsToGame * 60 * 1000);
  _nextGameTimer = setInterval(_bbTickNextGame, 1000);
  _bbTickNextGame(); // immediate first render
}

// ── Bot scan countdown (ticks every second) ──────────────────────────────────
let _scanTimer = null;
function _bbStartScanCountdown() {
  if (_scanTimer) clearInterval(_scanTimer);
  _scanTimer = setInterval(_bbTickScan, 1000);
}
function _bbTickScan() {
  const el = document.getElementById('bb-scan-cd');
  if (!el || !window._bbLastScan) return;
  const lastMs = new Date(window._bbLastScan).getTime();
  const nextMs = lastMs + (window._bbPollInterval || 1800) * 1000;
  const secsLeft = Math.max(0, Math.floor((nextMs - Date.now()) / 1000));
  if (secsLeft <= 0) {
    el.textContent = 'scanning...';
    el.style.color = 'var(--green)';
  } else {
    const m = Math.floor(secsLeft / 60);
    const s = secsLeft % 60;
    el.textContent = `${m}m ${String(s).padStart(2, '0')}s`;
  }
}

function _bbTickNextGame() {
  const el = document.getElementById('bb-next-game-cd');
  if (!el || _nextGameEpoch === null) return;
  const diff = _nextGameEpoch - Date.now();
  if (diff <= 0) { el.textContent = 'starting now'; return; }
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  el.textContent = h > 0
    ? `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`
    : `${m}m ${String(s).padStart(2,'0')}s`;
}

function _bbTickCountdown() {
  _bbCountdown--;
  const lbl = document.getElementById('bb-refresh-label');
  if (lbl) lbl.textContent = `refresh in ${_bbCountdown}s`;
  if (_bbCountdown <= 0) {
    clearInterval(_bbRefreshTimer);
    _bbRefreshTimer = null;
    // Only auto-refresh if baseball tab is still active
    if (document.getElementById('page-baseball').classList.contains('active')) {
      loadBaseball();
    }
  }
}

function _bbStartCountdown() {
  if (_bbRefreshTimer) clearInterval(_bbRefreshTimer);
  _bbCountdown = BB_REFRESH_SEC;
  _bbRefreshTimer = setInterval(_bbTickCountdown, 1000);
}

// ── MLB live scores (free MLB Stats API, no key needed) ─────────────────────
async function fetchMLBScores() {
  try {
    const now      = new Date();
    const today    = now.toLocaleDateString('en-CA', {timeZone: 'America/Chicago'});
    const yday     = new Date(now - 864e5).toLocaleDateString('en-CA', {timeZone: 'America/Chicago'});

    // Fetch today + yesterday so early-morning hours still show last night's results
    const [r1, r2] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=linescore,teams`, {signal: AbortSignal.timeout(5000)}),
      fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${yday}&hydrate=linescore,teams`,  {signal: AbortSignal.timeout(5000)}),
    ]);
    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);

    const scores = {};
    const parseGames = (d, dateLabel) => {
      for (const dateEntry of (d.dates || [])) {
        for (const game of (dateEntry.games || [])) {
          const away  = game.teams.away.team.name;
          const home  = game.teams.home.team.name;
          const key   = `${away}::${home}`;
          const state = game.status.detailedState || '';
          const ls    = game.linescore || {};
          scores[key] = {
            status:     state,
            gameDate:   dateLabel,
            done:       ['Final','Game Over','Completed Early'].some(s => state.includes(s)),
            inProgress: state.includes('In Progress') || state.includes('Manager Challenge'),
            awayScore:  game.teams.away.score ?? null,
            homeScore:  game.teams.home.score ?? null,
            inning:     ls.currentInning || null,
            half:       ls.inningHalf || '',
            awayName:   away,
            homeName:   home,
          };
        }
      }
    };

    // Parse yesterday first so today overwrites if same game appears
    parseGames(d2, yday);
    parseGames(d1, today);
    return scores;
  } catch { return {}; }
}

// ── MLB team standings / season records (free, no key) ──────────────────────
async function fetchMLBStandings() {
  try {
    const thisYear = new Date().getFullYear();
    const lastYear = thisYear - 1;
    const MIN_GAMES = 10; // games needed before current season is meaningful

    // Fetch current AND last season in parallel
    const [rCur, rPrev] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=${thisYear}&standingsTypes=regularSeason`, {signal: AbortSignal.timeout(5000)}),
      fetch(`https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=${lastYear}&standingsTypes=regularSeason`, {signal: AbortSignal.timeout(5000)}),
    ]);
    const [dCur, dPrev] = await Promise.all([rCur.json(), rPrev.json()]);

    const parse = (d, seasonLabel) => {
      const out = {};
      for (const div of (d.records || [])) {
        for (const tr of (div.teamRecords || [])) {
          const name = tr.team.name;
          const w = tr.wins || 0;
          const l = tr.losses || 0;
          const pct = w + l > 0 ? (w / (w + l) * 100).toFixed(0) : null;
          const entry = { w, l, pct, season: seasonLabel };
          out[name] = entry;
          out[name.split(' ').pop()] = entry; // fuzzy: "Pirates"
        }
      }
      return out;
    };

    const cur  = parse(dCur,  thisYear);
    const prev = parse(dPrev, lastYear);

    // Use current season if team has played >= MIN_GAMES, else fall back to last season
    const merged = {};
    const allNames = new Set([...Object.keys(cur), ...Object.keys(prev)]);
    for (const name of allNames) {
      const c = cur[name];
      const p = prev[name];
      if (c && (c.w + c.l) >= MIN_GAMES) {
        merged[name] = c;
      } else if (p) {
        merged[name] = { ...p, fallback: true }; // mark as prior season
      } else if (c) {
        merged[name] = c;
      }
    }
    return merged;
  } catch { return {}; }
}

// Fuzzy standings lookup
function _record(standings, teamName) {
  if (!teamName) return null;
  if (standings[teamName]) return standings[teamName];
  const last = teamName.split(' ').pop();
  return standings[last] || null;
}

// Render a tiny W-L badge
function _recordBadge(rec) {
  if (!rec || rec.w + rec.l === 0) return `<span class="dim" style="font-size:9px">—</span>`;
  const color  = rec.pct >= 55 ? 'var(--green)' : rec.pct >= 45 ? 'var(--text)' : 'var(--red)';
  const label  = rec.fallback ? `${rec.season}` : `${rec.season}`;
  return `<span style="font-size:9px;color:${color}">${rec.w}-${rec.l} (${rec.pct}%)</span>`
       + `<span style="font-size:8px;color:var(--text-dim);margin-left:3px">${label}</span>`;
}

// Fuzzy score lookup: find the best key match for away@home team names
function _scoreKey(scores, away, home) {
  const exact = `${away}::${home}`;
  if (scores[exact]) return scores[exact];
  // Try matching by last word of team name (e.g. "Dodgers", "Pirates")
  const awayLast = away.split(' ').pop().toLowerCase();
  const homeLast = home.split(' ').pop().toLowerCase();
  for (const k of Object.keys(scores)) {
    const [ka, kh] = k.split('::');
    if (!ka || !kh) continue;
    const kaLast = ka.split(' ').pop().toLowerCase();
    const khLast = kh.split(' ').pop().toLowerCase();
    if ((kaLast === awayLast || ka.toLowerCase().includes(awayLast)) &&
        (khLast === homeLast || kh.toLowerCase().includes(homeLast)))
      return scores[k];
  }
  return null;
}

      const renderGameCard = g => {

              // Check live Kalshi positions first (source of truth)

              // Then check bet log

        <div class="panel-label" style="margin-bottom:4px">
          SIGNALS &nbsp;<span class="dim" style="font-size:10px">edge > 4¢ highlighted · sorted by first pitch</span>
          ${sigCount ? `<span style="margin-left:8px;font-size:10px;color:var(--green)">${sigCount} signal${sigCount>1?'s':''}</span>` : ''}
        </div>
      </div>`;

      // Show all upcoming games in one section (no today/tomorrow split)
      const allGames = data.games.sort((a, b) => a.mins_to_game - b.mins_to_game);
      mainHtml += renderSection(allGames, 'GAMES', new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',timeZone:'America/Chicago'}));

      // ── RESULTS: completed games (today + yesterday) ──────────────────────
      const completedGames = Object.values(mlbScores).filter(sc => sc.done && sc.awayScore !== null);
      const todayStr = new Date().toLocaleDateString('en-CA', {timeZone:'America/Chicago'});
      const ydayStr  = new Date(Date.now() - 864e5).toLocaleDateString('en-CA', {timeZone:'America/Chicago'});
      if (completedGames.length) {
        // Group by date
        const byDate = {};
        for (const sc of completedGames) {
          const d = sc.gameDate || todayStr;
          if (!byDate[d]) byDate[d] = [];
          byDate[d].push(sc);
        }
        const dateGroups = Object.keys(byDate).sort().reverse(); // newest first

        mainHtml += `
          <div style="margin-bottom:24px">
            <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px;
                        padding-bottom:6px;border-bottom:1px solid var(--border)">
              <div class="panel-label" style="margin:0">RESULTS</div>
              <span class="dim" style="font-size:10px">last 2 days</span>
            </div>
            ${dateGroups.map(dateKey => {
              const games    = byDate[dateKey];
              const isToday  = dateKey === todayStr;
              const isYday   = dateKey === ydayStr;
              const dateDisp = isToday ? 'Today' : isYday ? 'Yesterday'
                : new Date(dateKey + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
              return `
              <div style="margin-bottom:16px">
                <div style="font-size:10px;color:var(--text-dim);font-weight:600;letter-spacing:.08em;
                            margin-bottom:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
                  ${dateDisp.toUpperCase()}
                </div>
                <table style="width:100%;border-collapse:collapse;font-size:11px">
                  <thead>
                    <tr style="color:rgba(255,255,255,0.3);font-size:9px;letter-spacing:.06em">
                      <th style="padding:4px 8px;font-weight:400;text-align:left">MATCHUP</th>
                      <th style="padding:4px 8px;font-weight:400;text-align:center">SCORE</th>
                      <th style="padding:4px 8px;font-weight:400;text-align:left">WINNER</th>
                      <th style="padding:4px 8px;font-weight:400;text-align:right">RECORD</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${games.map(sc => {
                      const winner    = sc.awayScore > sc.homeScore ? sc.awayName : sc.homeName;
                      const awayWon   = sc.awayScore > sc.homeScore;
                      const winnerRec = _record(standings, winner);
                      const awayRec   = _record(standings, sc.awayName);
                      const homeRec   = _record(standings, sc.homeName);
                      return `
                      <tr style="border-bottom:1px solid rgba(255,255,255,0.04)">
                        <td style="padding:7px 8px">
                          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
                            <span style="color:${awayWon?'var(--text-bright)':'var(--text-dim)'};font-weight:${awayWon?'600':'400'}">${sc.awayName}</span>
                            ${awayRec ? `<span style="font-size:9px;color:rgba(255,255,255,0.25)">${awayRec.w}-${awayRec.l}</span>` : ''}
                            <span style="color:var(--text-dim)">@</span>
                            <span style="color:${!awayWon?'var(--text-bright)':'var(--text-dim)'};font-weight:${!awayWon?'600':'400'}">${sc.homeName}</span>
                            ${homeRec ? `<span style="font-size:9px;color:rgba(255,255,255,0.25)">${homeRec.w}-${homeRec.l}</span>` : ''}
                          </div>
                        </td>
                        <td style="padding:7px 8px;text-align:center;font-variant-numeric:tabular-nums;
                                   font-weight:700;color:var(--cyan)">${sc.awayScore} – ${sc.homeScore}</td>
                        <td style="padding:7px 8px;color:var(--green);font-weight:600">▶ ${winner}</td>
                        <td style="padding:7px 8px;text-align:right">
                          ${winnerRec && winnerRec.w + winnerRec.l > 0
                            ? `<span style="color:${winnerRec.pct>=55?'var(--green)':winnerRec.pct>=45?'var(--text)':'var(--red)'};font-size:10px">
                                ${winnerRec.w}-${winnerRec.l} &nbsp;${winnerRec.pct}%
                               </span>
                               <span style="font-size:8px;color:var(--text-dim);margin-left:3px">${winnerRec.season}</span>`
                            : `<span class="dim" style="font-size:9px">—</span>`}
                        </td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>`;
            }).join('')}
          </div>`;
      } else {
        mainHtml += `
          <div style="margin-bottom:24px;padding:12px 16px;background:rgba(255,255,255,0.02);
                      border:1px solid var(--border);border-radius:6px">
            <div class="panel-label" style="margin-bottom:6px">RESULTS</div>
            <div class="dim" style="font-size:11px">No completed games yet — check back after the first games finish tonight.</div>
          </div>`;
      }
    }

    // ── Empty state if no games ─────────────────────────────────────────────
    if (!data.games || !data.games.length) {
      mainHtml += `<div style="padding:40px 20px;text-align:center">
        <div style="font-size:18px;color:var(--text-dim);margin-bottom:12px">⚠ No MLB games loaded</div>
        <div style="font-size:11px;color:var(--text-dim);line-height:1.8">
          Possible causes:<br>
          • Odds API quota exhausted (free tier = 500/month)<br>
          • No MLB games scheduled right now<br>
          • API returned an error — check /api/baseball/debug<br>
          ${data.odds_remaining !== undefined ? '<br>Odds API remaining: <b>' + data.odds_remaining + '</b>' : ''}
        </div>
      </div>`;
    }

    // ── Compose two-column layout ───────────────────────────────────────────
    el.innerHTML = `<div class="dashboard-grid"><div class="dash-main">${mainHtml}</div><div class="dash-sidebar">${sidebarHtml}</div></div>`;
    renderPnlChart(betsData, liveBalance);
    // Update Odds API quota in header
    const quotaEl = document.getElementById('bb-odds-quota');
    if (quotaEl && data.odds_remaining !== undefined && data.odds_remaining !== null) {
      const rem = parseInt(data.odds_remaining);
      const color = rem > 1000 ? 'var(--green-dim)' : rem > 100 ? 'var(--yellow)' : 'var(--red)';
      quotaEl.innerHTML = `API: <span style="color:${color}">${rem.toLocaleString()}</span> left`;
    }

    // Start countdowns AFTER DOM is updated so elements exist
    if (upcoming && upcoming.length) _bbStartNextGameCountdown(upcoming[0].mins_to_game);
    if (data.last_scan) _bbStartScanCountdown();
    // Start fast score refresh if any live games visible
    if (data.games && data.games.some(g => g.mins_to_game <= 0)) _startLiveScoreTimer();
    _bbStartCountdown();
  } catch(e) {
    document.getElementById('baseball-content').innerHTML =
      `<div class="empty-state" style="color:var(--red)">Error: ${e.message}</div>`;
    _bbStartCountdown();  // retry after countdown even on error
  }
}

async function logExistingBet(btn, gameId, side, contracts, priceCents, teamName, home, away, gameDate, vegasProb, edge, ticker) {
  btn.disabled = true;
  btn.textContent = 'logging...';
  try {
    const res = await fetch('/api/baseball/log_bet', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        game_id:     gameId,
        home,
        away,
        team:        teamName,
        side,
        ticker,
        contracts,
        price_cents: priceCents,
        vegas_prob:  vegasProb,
        edge,
        game_date:   gameDate,
      }),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      btn.textContent = '✓ LOGGED';
      btn.style.background = 'rgba(0,255,136,0.12)';
      btn.style.color = 'var(--green)';
      btn.style.border = '1px solid rgba(0,255,136,0.4)';
      setTimeout(() => loadBaseball(), 800);
    } else {
      btn.textContent = 'Error';
      btn.style.color = 'var(--red)';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = `Error: ${e.message}`;
    btn.style.color = 'var(--red)';
    btn.disabled = false;
  }
}

const _bbPlacedGames = new Set(); // prevent double-click across the session

async function placeBaseballBet(gameId, side, contracts, price, teamName) {
  const key = `${gameId}-${side}`;
  if (_bbPlacedGames.has(key)) return; // already placed this session
  _bbPlacedGames.add(key);

  const btnId = `bet-btn-${gameId}-${side}`;
  const btn = document.getElementById(btnId);
  if (btn) { btn.textContent = 'placing...'; btn.disabled = true; btn.style.opacity = '0.5'; }

  try {
    const res = await fetch('/api/baseball/bet', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        game_id:      gameId,
        side:         side,
        contracts:    contracts,
        price:        price,
        team_bet_on:  teamName,
      }),
    });
    const data = await res.json();
    if (data.success) {
      if (btn) {
        btn.textContent = '✓ ORDER SENT';
        btn.style.background = 'rgba(0,255,136,0.15)';
        btn.style.color = 'var(--green)';
      }
      setTimeout(() => loadBaseball(), 1500);
    } else {
      _bbPlacedGames.delete(key); // allow retry on error
      if (btn) {
        btn.textContent = `Error: ${data.error || 'Failed'}`;
        btn.style.color = 'var(--red)';
        btn.disabled = false; btn.style.opacity = '1';
      }
    }
  } catch(e) {
    _bbPlacedGames.delete(key);
    if (btn) {
      btn.textContent = `Error: ${e.message}`;
      btn.style.color = 'var(--red)';
      btn.disabled = false; btn.style.opacity = '1';
    }
  }
}

function renderBaseballBets(betsData, liveBalance, livePositions, mlbScores, portfolioVal) {
  livePositions = livePositions || [];
  mlbScores = mlbScores || {};
  const s    = betsData.summary || {};
  const bets = betsData.bets   || [];

  const pnl      = s.total_pnl  || 0;
  const pnlClass = pnl > 0 ? 'bb-pnl-pos' : pnl < 0 ? 'bb-pnl-neg' : 'bb-pnl-nil';
  const pnlSign  = pnl >= 0 ? '+' : '';
  const winRate  = s.win_rate != null ? s.win_rate : '--';

  // Always prefer real Kalshi balance; fall back to tracked values
  const displayBalance  = liveBalance || s.current_bankroll || 100;
  const displayPortfolio = portfolioVal || displayBalance;
  // Starting: use stored starting_bankroll only if it's not the placeholder $100
  const storedStart     = s.starting_bankroll;
  const startingBalance = (storedStart && storedStart !== 100)
                            ? storedStart
                            : (liveBalance || 100);

  let html = `
    <div class="bb-summary">
      <div class="bb-stat">
        <div class="bb-stat-label">Portfolio</div>
        <div class="bb-stat-val" style="color:var(--green)">$${displayPortfolio.toFixed(2)}</div>
        <div class="bb-stat-sub">cash $${displayBalance.toFixed(2)}</div>
      </div>
      <div class="bb-stat">
        <div class="bb-stat-label">P&amp;L</div>
        <div class="bb-stat-val ${pnlClass}">${pnlSign}$${Math.abs(pnl).toFixed(2)}</div>
        <div class="bb-stat-sub">wagered $${(s.total_wagered || 0).toFixed(2)}</div>
      </div>
      <div class="bb-stat">
        <div class="bb-stat-label">Record</div>
        <div class="bb-stat-val" style="color:var(--text-bright)">${s.wins || 0}W – ${s.losses || 0}L</div>
        <div class="bb-stat-sub">${s.pending || 0} pending</div>
      </div>
      <div class="bb-stat">
        <div class="bb-stat-label">Win %</div>
        <div class="bb-stat-val" style="color:${winRate >= 55 ? 'var(--green)' : winRate >= 45 ? 'var(--yellow)' : 'var(--red)'}">${winRate}%</div>
        <div class="bb-stat-sub">${(s.wins||0) + (s.losses||0)} resolved</div>
      </div>
    </div>`;

  // PnL chart placeholder
  html += `
    <div class="bb-chart-wrap">
      <div class="bb-chart-label">Bankroll curve</div>
      <canvas id="bb-pnl-chart" height="70"></canvas>
    </div>`;

  // Split into pending (current positions) vs resolved (history includes canceled)
  const pending  = bets.filter(b => b.status === 'pending');
  const resolved = bets.filter(b => b.status !== 'pending');

  // ── Current Positions ─────────────────────────────────────────────────────
  // Use LIVE Kalshi positions (source of truth), not bet log
  if (livePositions.length) {
    html += `
      <div class="panel-label" style="margin-bottom:6px">
        OPEN POSITIONS &nbsp;<span class="bb-status bb-status-pending" style="vertical-align:middle">${livePositions.length}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">
        ${livePositions.map((p, pi) => {
            const sc = _scoreKey(mlbScores, p.away, p.home);
            const gameStarted = sc && (sc.inProgress || sc.done);
            const scoreStr = sc && sc.awayScore !== null
              ? `${sc.awayScore} – ${sc.homeScore}` : '';
            const situStr = sc && sc.done ? 'Final'
              : sc && sc.inning ? `${sc.half === 'Bottom' ? '▼' : '▲'}${sc.inning}`
              : sc && sc.inProgress ? 'Live' : '';
            const winner = sc && sc.done && sc.awayScore !== null
              ? (sc.awayScore > sc.homeScore ? sc.awayName : sc.homeName) : null;
            const betWon = winner && p.team && (winner.includes(p.team.split(' ').pop()) || p.team.includes(winner.split(' ').pop()));

            // Status badge + border color
            let badge, borderColor;
            if (sc && sc.done) {
              badge = `<span style="font-size:8px;font-weight:700;color:${betWon ? 'var(--green)' : 'var(--red)'}">${betWon ? '✓ WON' : '✗ LOST'}</span>`;
              borderColor = betWon ? 'rgba(0,255,136,0.4)' : 'rgba(255,68,102,0.4)';
            } else if (gameStarted) {
              badge = `<span style="font-size:8px;font-weight:700;color:var(--red)">● LIVE</span>`;
              borderColor = 'rgba(255,60,60,0.25)';
            } else {
              // Game hasn't started — show countdown
              const minsLeft = p.mins_to_game;
              let waitLabel = 'WAITING';
              if (minsLeft && minsLeft > 0) {
                const h = Math.floor(minsLeft / 60);
                const m = minsLeft % 60;
                waitLabel = h > 0 ? `${h}h ${m}m` : `${m}m`;
              }
              badge = `<span style="font-size:8px;font-weight:600;color:var(--cyan)" id="pos-cd-${pi}">⏱ ${waitLabel}</span>`;
              borderColor = 'rgba(0,212,255,0.15)';
            }

            // Score line (only when game has started)
            const scoreLine = gameStarted
              ? `<span style="font-size:10px;font-weight:700;color:var(--cyan);font-variant-numeric:tabular-nums">
                  <span class="live-score">${scoreStr}</span>
                  <span class="live-situ dim" style="font-size:8px;margin-left:4px">${situStr}</span>
                </span>` : '';

            return `
            <div data-live-game="1" data-away="${p.away}" data-home="${p.home}"
                 style="padding:5px 7px;background:var(--bg2);border:1px solid ${borderColor};border-radius:4px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
                <span style="font-size:11px;font-weight:700;color:var(--text-bright)">${p.team}</span>
                ${badge}
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
                <span class="dim" style="font-size:9px">${p.away} @ ${p.home}</span>
                ${scoreLine}
              </div>
              <div style="display:flex;gap:8px;font-size:9px;align-items:center">
                <span>${p.quantity}x @ ${p.avg_price}¢</span>
                <span style="color:var(--yellow)">cost $${p.cost.toFixed(2)}</span>
                <span style="color:var(--green)">win +$${p.to_win.toFixed(2)}</span>
                <span style="color:var(--cyan);font-weight:700">${((p.cost + p.to_win) / p.cost).toFixed(2)}x</span>
              </div>
            </div>`;
          }).join('')}
      </div>`;
  } else if (pending.length) {
    // Fallback: show pending bets from log if Kalshi positions unavailable
    html += `
      <div class="panel-label" style="margin-bottom:6px">
        PENDING BETS &nbsp;<span class="bb-status bb-status-pending" style="vertical-align:middle">${pending.length}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">
        ${pending.map(b => {
          const cost = (b.contracts * b.price_cents / 100).toFixed(2);
          const potW = (b.contracts * (100 - b.price_cents) / 100).toFixed(2);
          return `
            <div style="padding:5px 7px;background:var(--bg2);border:1px solid rgba(255,215,0,0.15);border-radius:4px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
                <span style="font-size:11px;font-weight:700;color:var(--text-bright)">${b.team}</span>
                <span class="bb-status bb-status-pending" style="font-size:8px">pending</span>
              </div>
              <div class="dim" style="font-size:9px;margin-bottom:3px">${b.away} @ ${b.home}</div>
              <div style="display:flex;gap:8px;font-size:9px">
                <span>${b.contracts}x @ ${b.price_cents}¢</span>
                <span style="color:var(--yellow)">risk $${cost}</span>
                <span style="color:var(--green)">win +$${potW}</span>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }

  // ── BET RESULTS — only show RESOLVED bets (won/lost/canceled) ─────────────
  const resolvedBets = bets.filter(b => b.status === 'won' || b.status === 'lost');
  const totalPnl = resolvedBets.reduce((sum, b) => sum + (b.pnl || 0), 0);

  if (resolvedBets.length) {
    html += `
      <div class="panel-label" style="margin-bottom:8px">
        TODAY'S RESULTS &nbsp;
        <span class="dim" style="font-size:10px">${resolvedBets.length} completed</span>
        <span style="margin-left:8px;font-size:10px;font-weight:700;color:${totalPnl >= 0 ? 'var(--green)' : 'var(--red)'}">
          ${totalPnl >= 0 ? '+' : ''}$${Math.abs(totalPnl).toFixed(2)}
        </span>
      </div>`;

    // ── Resolved bets table ───────────────────────────────────────────────
    if (resolvedBets.length) {
      html += `
      <div class="table-wrap" style="margin-bottom:14px">
        <table style="font-size:10px">
          <thead>
            <tr>
              <th style="text-align:left">DATE</th>
              <th style="text-align:left">BET</th>
              <th>PRICE</th><th>EDGE</th>
              <th>RESULT</th><th>P&amp;L</th>
            </tr>
          </thead>
          <tbody>
            ${resolvedBets.map(b => {
              const dt  = new Date(b.timestamp).toLocaleDateString('en-US', {month:'short',day:'numeric'});
              const pnlVal = b.pnl || 0;
              const pnlHtml = b.pnl != null
                ? `<span class="${pnlVal >= 0 ? 'bb-pnl-pos' : 'bb-pnl-neg'}">${pnlVal >= 0 ? '+' : ''}$${Math.abs(pnlVal).toFixed(2)}</span>`
                : '<span class="bb-pnl-nil">–</span>';
              const statusColor = b.status === 'won' ? 'var(--green)' : b.status === 'lost' ? 'var(--red)' : 'var(--text-dim)';
              return `<tr style="border-left:2px solid ${statusColor}">
                <td class="dim">${dt}</td>
                <td style="color:var(--text-bright);font-weight:600">${b.team} <span class="dim" style="font-weight:400">${b.contracts}x</span></td>
                <td class="dim">${b.price_cents}¢</td>
                <td class="green">${b.edge !== '—' ? '+' + b.edge + 'c' : '—'}</td>
                <td><span style="font-size:9px;font-weight:700;color:${statusColor};text-transform:uppercase">${b.status}</span></td>
                <td>${pnlHtml}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
    }
  } else {
    // No resolved bets yet — show a subtle message
    html += `
      <div style="color:var(--text-dim);font-size:11px;margin-bottom:14px;padding:12px 0">
        No completed bets yet — results appear when games finish.
      </div>`;
  }

  return html;
}

function renderPnlChart(betsData, liveBalance) {
  const canvas = document.getElementById('bb-pnl-chart');
  if (!canvas) return;

  if (_bbPnlChart) { _bbPnlChart.destroy(); _bbPnlChart = null; }

  const s = betsData.summary || {};

  // Starting balance: live Kalshi balance always wins; fall back to stored value
  const storedStart = s.starting_bankroll;
  const trueStart = liveBalance || storedStart || 100;

  // Clone curve and override the first "start" point with the corrected value
  const rawCurve = (s.curve || []).map(p => ({...p}));
  if (rawCurve.length > 0 && rawCurve[0].label === 'start') {
    rawCurve[0].bankroll = trueStart;
  }

  const labels = rawCurve.map(p => p.label);
  const values = rawCurve.map(p => p.bankroll);
  const colors = rawCurve.map((p, i) => {
    if (i === 0) return 'rgba(0,212,255,0.8)';
    return p.won ? 'rgba(0,255,136,1)' : 'rgba(255,68,102,1)';
  });

  // Y-axis range: give 10% padding around the actual data range
  const allVals = values.length ? values : [trueStart];
  const minVal  = Math.min(...allVals);
  const maxVal  = Math.max(...allVals);
  const pad     = Math.max((maxVal - minVal) * 0.15, trueStart * 0.08, 0.5);

  _bbPnlChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: '#00ff88',
        borderWidth: 2,
        pointBackgroundColor: colors,
        pointRadius: rawCurve.length <= 1 ? 4 : 5,
        pointHoverRadius: 7,
        tension: 0.3,
        fill: {
          target: 'origin',
          above: 'rgba(0,255,136,0.06)',
          below: 'rgba(255,68,102,0.06)',
        },
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `$${ctx.parsed.y.toFixed(2)}`,
          },
          backgroundColor: '#0a0a0f',
          borderColor: '#1a1a25',
          borderWidth: 1,
          titleColor: '#c9d1d9',
          bodyColor: '#00ff88',
        }
      },
      scales: {
        x: {
          ticks: { color: '#6e7681', font: { family: 'JetBrains Mono', size: 10 } },
          grid:  { color: 'rgba(26,26,37,0.5)' },
        },
        y: {
          suggestedMin: minVal - pad,
          suggestedMax: maxVal + pad,
          ticks: {
            color: '#6e7681',
            font: { family: 'JetBrains Mono', size: 10 },
            callback: v => '$' + v.toFixed(2),
          },
          grid: { color: 'rgba(26,26,37,0.5)' },
        }
      }
    }
  });
}

async function bbPlaceBet(btn, ticker, home, away, team, side, contracts, priceCents, vegasPct, edge) {
  btn.disabled = true;
  btn.textContent = 'logging...';
  try {
    await fetch('/api/baseball/log_bet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ home, away, team, side, ticker, contracts,
                             price_cents: priceCents, vegas_prob: vegasPct, edge }),
    });
    btn.textContent = '✓ LOGGED';
    btn.style.background = 'rgba(0,255,136,0.12)';
    btn.style.color = 'var(--green)';
    // Reload bets section after short delay
    setTimeout(() => loadBaseball(), 800);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'ERROR — retry';
  }
}

// loadTradeLog removed — no trade log page

// ── Card flash on data update ──────────────────────────────────────────────
function flashEl(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

// ── Init ───────────────────────────────────────────────────────────────────
loadBaseball(true);
</script>
